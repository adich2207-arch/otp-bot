services:
  - type: web
    name: tg-market-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false          # set to https://<your-app-name>.onrender.com
      - key: SUPPORT_USERNAME
        sync: false          # your support Telegram username without @
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: tg-market-db
          property: connectionString

databases:
  - name: tg-market-db
    databaseName: tgmarket
    user: tgmarket
    plan: free
